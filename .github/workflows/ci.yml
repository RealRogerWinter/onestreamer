name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  server-test:
    name: Server tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install root dependencies
        run: npm ci --ignore-scripts
        # --ignore-scripts skips native-module builds (mediasoup worker, etc.)
        # that aren't needed for unit tests and slow down CI significantly.

      - name: Run server tests
        run: npm test
        env:
          NODE_ENV: test
          JWT_SECRET: ci-test-secret-not-for-real-use
          SESSION_SECRET: ci-test-session-not-for-real-use

  client-test:
    name: Client tests + typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install client dependencies
        working-directory: client
        run: npm ci

      - name: TypeScript typecheck
        working-directory: client
        run: npx tsc --noEmit

      - name: Run client tests
        working-directory: client
        run: npm test -- --watchAll=false --passWithNoTests
        env:
          CI: true

  docs-lint:
    name: Docs sanity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check repo-root markdown hygiene
        run: |
          # Only README, CONTRIBUTING, SECURITY, CHANGELOG, LICENSE, CLAUDE.md allowed at root
          allowed='README.md CONTRIBUTING.md SECURITY.md CHANGELOG.md LICENSE CLAUDE.md'
          found=$(ls -1 *.md *.MD 2>/dev/null || true)
          if [ -z "$found" ]; then exit 0; fi
          unexpected=""
          for f in $found; do
            case " $allowed " in
              *" $f "*) ;;
              *) unexpected="$unexpected $f" ;;
            esac
          done
          if [ -n "$unexpected" ]; then
            echo "::error::Unexpected .md files at repo root:$unexpected"
            echo "Only $allowed are allowed at root; move others to /docs/"
            exit 1
          fi

      - name: Check no remaining stub docs
        run: |
          if grep -r "Status:.*stub" docs/ --include='*.md' --exclude-dir=archive; then
            echo "::error::Docs contain stub markers — fill them in or remove the placeholder"
            exit 1
          fi

      - name: Check for committed real secret patterns
        run: |
          # Scan for SendGrid keys (SG.xxx) and the known TURN/Turnstile defaults
          # outside /docs/archive/ and /docs/operations/runbooks/secret-rotation.md
          # (which legitimately reference the literal value as an example).
          if grep -rE "SG\.[A-Za-z0-9_-]{20,}" \
            --include='*.js' --include='*.ts' --include='*.json' --include='*.md' \
            --exclude-dir=node_modules --exclude-dir=archive \
            . | grep -v "docs/operations/runbooks/secret-rotation.md"; then
            echo "::error::Found SendGrid-shaped key in committed files"
            exit 1
          fi
