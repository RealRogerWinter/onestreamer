<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stream Reducer Debug</title>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            padding: 20px; 
            background: #1a1a1a; 
            color: white;
        }
        .container { 
            max-width: 1200px; 
            margin: 0 auto; 
        }
        .video-container {
            position: relative;
            width: 640px;
            height: 480px;
            background: #333;
            margin: 20px 0;
            border: 2px solid #666;
        }
        video {
            width: 100%;
            height: 100%;
            background: #000;
        }
        .controls {
            margin: 20px 0;
        }
        button {
            padding: 10px 20px;
            margin: 5px;
            background: #007bff;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 4px;
        }
        button:hover {
            background: #0056b3;
        }
        .log {
            background: #2a2a2a;
            padding: 15px;
            border-radius: 4px;
            height: 300px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 12px;
            margin: 20px 0;
        }
        .status {
            padding: 10px;
            margin: 10px 0;
            border-radius: 4px;
        }
        .status.connected { background: #155724; }
        .status.disconnected { background: #721c24; }
        .effect-info {
            background: #2a2a2a;
            padding: 15px;
            border-radius: 4px;
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎯 Stream Reducer Debug Tool</h1>
        <p>This tool helps debug the stream reducer synchronization issue.</p>

        <div class="controls">
            <button onclick="connect()">Connect to Server</button>
            <button onclick="disconnect()">Disconnect</button>
            <button onclick="simulateStreamReducer()">Simulate Stream Reducer</button>
            <button onclick="clearLog()">Clear Log</button>
            <button onclick="testClientProcessor()">Test Client Processor</button>
        </div>

        <div id="status" class="status disconnected">
            Status: Disconnected
        </div>

        <div class="video-container">
            <video id="testVideo" muted autoplay>
                <source src="https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/BigBuckBunny.mp4" type="video/mp4">
                Your browser does not support the video tag.
            </video>
        </div>

        <div class="effect-info">
            <h3>Active Effects</h3>
            <div id="activeEffects">None</div>
        </div>

        <div class="log" id="logContainer"></div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="/ClientVisualFxProcessor.js"></script>
    <script>
        let socket = null;
        let processor = null;
        let isConnected = false;

        function log(message, type = 'info') {
            const container = document.getElementById('logContainer');
            const timestamp = new Date().toLocaleTimeString();
            const color = type === 'error' ? '#ff6b6b' : 
                         type === 'success' ? '#51cf66' : 
                         type === 'warning' ? '#ffd43b' : '#74c0fc';
            
            container.innerHTML += `<div style="color: ${color}">[${timestamp}] ${message}</div>`;
            container.scrollTop = container.scrollHeight;
        }

        function updateStatus(status) {
            const statusEl = document.getElementById('status');
            statusEl.textContent = `Status: ${status}`;
            statusEl.className = `status ${status === 'Connected' ? 'connected' : 'disconnected'}`;
        }

        function clearLog() {
            document.getElementById('logContainer').innerHTML = '';
        }

        function testClientProcessor() {
            const video = document.getElementById('testVideo');
            
            if (typeof ClientVisualFxProcessor === 'undefined') {
                log('❌ ClientVisualFxProcessor not loaded', 'error');
                return;
            }

            try {
                const testProcessor = new ClientVisualFxProcessor();
                const success = testProcessor.initialize(video);
                
                if (success) {
                    log('✅ ClientVisualFxProcessor initialized successfully', 'success');
                    
                    // Test applying stream_resize_half effect
                    const result = testProcessor.applyEffect('stream_resize_half', {
                        duration: 10000,
                        isStreamer: false
                    });
                    
                    if (result) {
                        log('✅ stream_resize_half effect applied successfully', 'success');
                        updateActiveEffects(['stream_resize_half']);
                        
                        // Remove after 10 seconds
                        setTimeout(() => {
                            testProcessor.removeEffect('stream_resize_half');
                            log('🔄 stream_resize_half effect removed', 'info');
                            updateActiveEffects([]);
                        }, 10000);
                    } else {
                        log('❌ Failed to apply stream_resize_half effect', 'error');
                    }
                } else {
                    log('❌ ClientVisualFxProcessor initialization failed', 'error');
                }
            } catch (error) {
                log(`❌ Error testing ClientVisualFxProcessor: ${error.message}`, 'error');
            }
        }

        function updateActiveEffects(effects) {
            const container = document.getElementById('activeEffects');
            if (effects.length === 0) {
                container.textContent = 'None';
            } else {
                container.innerHTML = effects.map(effect => `<span style="background: #007bff; padding: 2px 6px; border-radius: 3px; margin: 2px;">${effect}</span>`).join('');
            }
        }

        function connect() {
            if (isConnected) {
                log('Already connected', 'warning');
                return;
            }

            log('🔌 Connecting to server...');
            socket = io('http://localhost:3000');

            socket.on('connect', () => {
                isConnected = true;
                log('✅ Connected to server', 'success');
                updateStatus('Connected');

                // Initialize ClientVisualFxProcessor
                const video = document.getElementById('testVideo');
                if (typeof ClientVisualFxProcessor !== 'undefined') {
                    processor = new ClientVisualFxProcessor();
                    const success = processor.initialize(video);
                    
                    if (success) {
                        log('✅ ClientVisualFxProcessor initialized', 'success');
                    } else {
                        log('❌ ClientVisualFxProcessor initialization failed', 'error');
                    }
                } else {
                    log('❌ ClientVisualFxProcessor not available', 'error');
                }
            });

            socket.on('disconnect', () => {
                isConnected = false;
                log('❌ Disconnected from server', 'error');
                updateStatus('Disconnected');
                updateActiveEffects([]);
            });

            socket.on('visual-effect-applied', (data) => {
                log(`🎨 Received visual-effect-applied: ${JSON.stringify(data)}`, 'info');

                if (processor && data.effectId === 'stream_resize_half') {
                    const shouldApply = data.applyToAllViewers || !data.applyToStreamer;
                    
                    if (shouldApply) {
                        log(`🎯 Applying ${data.effectId} effect (${data.isSyncEvent ? 'SYNC' : 'LIVE'})`, 'success');
                        
                        const result = processor.applyEffect(data.effectId, {
                            duration: data.duration,
                            isSyncEvent: data.isSyncEvent
                        });

                        if (result) {
                            log('✅ Effect applied successfully', 'success');
                            updateActiveEffects([data.effectId]);
                        } else {
                            log('❌ Failed to apply effect', 'error');
                        }
                    } else {
                        log('❌ Effect not applicable for this client', 'warning');
                    }
                }
            });

            socket.on('visual-effect-removed', (data) => {
                log(`🎨 Received visual-effect-removed: ${JSON.stringify(data)}`, 'info');
                
                if (processor && data.effectId === 'stream_resize_half') {
                    processor.removeEffect(data.effectId);
                    log('🔄 Effect removed', 'info');
                    updateActiveEffects([]);
                }
            });
        }

        function disconnect() {
            if (socket) {
                socket.disconnect();
                socket = null;
                processor = null;
            }
        }

        function simulateStreamReducer() {
            if (!isConnected) {
                log('❌ Not connected to server', 'error');
                return;
            }

            log('🧪 Simulating stream reducer effect...');
            
            // Simulate the effect data that would be sent by the server
            const effectData = {
                effectId: 'stream_resize_half',
                duration: 60000,
                applyToStreamer: false,
                isStreamerPreview: false,
                applyToAllViewers: true,
                streamId: 'test_stream_123',
                effectConfig: {
                    id: 'stream_resize_half',
                    name: 'Stream Size Reducer',
                    type: 'resize',
                    parameters: { scale: 0.5, position: 'center' },
                    duration: 60000,
                    priority: 3
                },
                isSyncEvent: true
            };

            // Manually trigger the handler
            if (processor) {
                const result = processor.applyEffect(effectData.effectId, {
                    duration: effectData.duration,
                    isSyncEvent: effectData.isSyncEvent
                });

                if (result) {
                    log('✅ Manual stream reducer effect applied', 'success');
                    updateActiveEffects([effectData.effectId]);
                } else {
                    log('❌ Failed to apply manual stream reducer effect', 'error');
                }
            } else {
                log('❌ Processor not initialized', 'error');
            }
        }

        // Auto-connect when page loads
        window.addEventListener('load', () => {
            log('🚀 Page loaded, initializing debug tool...');
            
            // Wait a bit for video to load
            setTimeout(() => {
                log('📹 Video element ready, you can now connect and test');
            }, 2000);
        });
    </script>
</body>
</html>
