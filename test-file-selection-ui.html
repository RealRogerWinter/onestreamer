<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test File Selection UI</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            background: #1a1a1a;
            color: white;
        }
        
        .file-input-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-width: 500px;
        }
        
        .file-input {
            display: none;
        }
        
        .file-input-label {
            display: inline-block;
            padding: 10px 16px;
            background: linear-gradient(45deg, #2196f3, #03a9f4);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
            text-align: center;
            transition: all 0.3s ease;
            user-select: none;
        }
        
        .file-input-label:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 15px rgba(33, 150, 243, 0.3);
        }
        
        .file-path-input {
            padding: 8px 12px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 6px;
            color: white;
            font-size: 14px;
        }
        
        .selected-file {
            padding: 8px 12px;
            background: rgba(76, 175, 80, 0.2);
            border: 1px solid rgba(76, 175, 80, 0.3);
            border-radius: 6px;
            color: #4caf50;
            font-size: 13px;
            font-weight: 500;
        }
        
        .debug-info {
            margin-top: 20px;
            padding: 10px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 6px;
            font-family: monospace;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <h1>🔧 Test File Selection UI</h1>
    <p>This tests the exact same UI structure as the ViewBot admin panel to identify file selection issues.</p>
    
    <div class="file-input-group">
        <input
            type="file"
            accept="video/*"
            id="video-file-input"
            class="file-input"
        />
        <label for="video-file-input" class="file-input-label">
            📁 Choose Video File
        </label>
        <input
            type="text"
            id="file-path-input"
            placeholder="Selected file path will appear here"
            class="file-path-input"
        />
        <div id="selected-file" class="selected-file" style="display: none;">
            📹 Selected: <span id="filename"></span>
            <br>
            <small id="filepath" style="opacity: 0.7;"></small>
        </div>
    </div>
    
    <div class="debug-info" id="debug-info">
        <strong>Debug Info:</strong><br>
        <div id="debug-output">No events yet...</div>
    </div>
    
    <script>
        function addDebug(message) {
            const debugOutput = document.getElementById('debug-output');
            const timestamp = new Date().toLocaleTimeString();
            debugOutput.innerHTML += `<br>[${timestamp}] ${message}`;
            console.log(message);
        }
        
        // File input change handler
        document.getElementById('video-file-input').addEventListener('change', function(e) {
            addDebug('📁 File input change event triggered');
            
            const file = e.target.files?.[0];
            if (!file) {
                addDebug('❌ No file selected');
                return;
            }
            
            addDebug(`📋 File selected: ${file.name} (${file.type}, ${(file.size / 1024 / 1024).toFixed(1)}MB)`);
            
            // Simulate the file path (in real app this would be upload result)
            const simulatedPath = `C:\\uploads\\${file.name}`;
            
            // Update the text input
            const pathInput = document.getElementById('file-path-input');
            pathInput.value = simulatedPath;
            addDebug(`📋 Updated path input: ${simulatedPath}`);
            
            // Show selected file info
            const selectedDiv = document.getElementById('selected-file');
            const filenameSpan = document.getElementById('filename');
            const filepathSpan = document.getElementById('filepath');
            
            filenameSpan.textContent = file.name;
            filepathSpan.textContent = `Path: ${simulatedPath}`;
            selectedDiv.style.display = 'block';
            
            addDebug('✅ UI updated successfully');
        });
        
        // Label click handler (backup)
        document.querySelector('.file-input-label').addEventListener('click', function(e) {
            addDebug('📁 File label clicked');
            e.preventDefault();
            const fileInput = document.getElementById('video-file-input');
            if (fileInput) {
                addDebug('📁 Triggering file input click');
                fileInput.click();
            } else {
                addDebug('❌ File input not found!');
            }
        });
        
        // Text input change handler
        document.getElementById('file-path-input').addEventListener('input', function(e) {
            addDebug(`📝 Manual path input changed: ${e.target.value}`);
        });
        
        addDebug('🔧 Test UI initialized');
    </script>
</body>
</html>
