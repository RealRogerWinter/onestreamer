<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TURN Server Connectivity Test</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            background: #1a1a1a;
            color: #fff;
        }
        h1 { color: #4CAF50; }
        .test-section {
            background: #2a2a2a;
            border-radius: 8px;
            padding: 20px;
            margin: 20px 0;
        }
        .status {
            padding: 10px;
            border-radius: 4px;
            margin: 10px 0;
        }
        .success { background: #4CAF50; }
        .error { background: #f44336; }
        .warning { background: #ff9800; }
        .info { background: #2196F3; }
        .candidate {
            background: #333;
            padding: 5px 10px;
            margin: 5px 0;
            border-radius: 4px;
            font-family: monospace;
            font-size: 12px;
        }
        button {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover { background: #45a049; }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 10px;
            margin: 20px 0;
        }
        .stat-card {
            background: #333;
            padding: 15px;
            border-radius: 4px;
        }
        .stat-value {
            font-size: 24px;
            font-weight: bold;
            color: #4CAF50;
        }
        .stat-label {
            font-size: 12px;
            color: #888;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <h1>🔍 TURN Server Connectivity Test</h1>
    
    <div class="test-section">
        <h2>Network Information</h2>
        <div id="networkInfo"></div>
    </div>

    <div class="test-section">
        <h2>Test Controls</h2>
        <button onclick="runFullTest()">Run Complete Test</button>
        <button onclick="testDirectConnection()">Test Direct (No TURN)</button>
        <button onclick="testTurnOnly()">Test TURN Only</button>
        <button onclick="testAllMethods()">Test All Methods</button>
    </div>

    <div class="test-section">
        <h2>Connection Statistics</h2>
        <div class="stats-grid" id="stats">
            <div class="stat-card">
                <div class="stat-value" id="hostCount">0</div>
                <div class="stat-label">Host Candidates</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="srflxCount">0</div>
                <div class="stat-label">STUN Candidates</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="relayCount">0</div>
                <div class="stat-label">TURN Candidates</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="connectionTime">-</div>
                <div class="stat-label">Connection Time (ms)</div>
            </div>
        </div>
    </div>

    <div class="test-section">
        <h2>Test Results</h2>
        <div id="results"></div>
    </div>

    <div class="test-section">
        <h2>ICE Candidates</h2>
        <div id="candidates"></div>
    </div>

    <script>
        // TURN server configuration
        const TURN_CONFIG = {
            server: '<SERVER_IP>',
            ports: {
                udp: 3478,
                tcp: 3478,
                tls: 5349
            },
            secret: '***REMOVED-TURN-SECRET***'
        };

        // Statistics tracking
        let stats = {
            host: 0,
            srflx: 0,
            relay: 0,
            startTime: 0,
            connectionTime: 0
        };

        // Network information detection
        async function detectNetwork() {
            const info = document.getElementById('networkInfo');
            let html = '';
            
            // Check connection type
            const connection = navigator.connection || navigator.mozConnection || navigator.webkitConnection;
            if (connection) {
                html += `<div class="status info">Connection Type: ${connection.effectiveType || 'Unknown'}</div>`;
                html += `<div class="status info">Downlink: ${connection.downlink || 'Unknown'} Mbps</div>`;
                
                if (connection.type) {
                    html += `<div class="status info">Network Type: ${connection.type}</div>`;
                }
            }
            
            // Detect if mobile
            const isMobile = /Android|webOS|iPhone|iPad|iPod/i.test(navigator.userAgent);
            html += `<div class="status info">Device: ${isMobile ? 'Mobile' : 'Desktop'}</div>`;
            
            // Get local IP (requires user permission)
            try {
                const pc = new RTCPeerConnection({iceServers: []});
                pc.createDataChannel('');
                const offer = await pc.createOffer();
                await pc.setLocalDescription(offer);
                
                await new Promise(resolve => {
                    pc.onicecandidate = (ice) => {
                        if (!ice || !ice.candidate || !ice.candidate.candidate) {
                            resolve(null);
                            return;
                        }
                        const candidate = ice.candidate.candidate;
                        if (candidate.includes('host')) {
                            const ip = candidate.split(' ')[4];
                            html += `<div class="status info">Local IP: ${ip}</div>`;
                            resolve(null);
                        }
                    };
                });
                pc.close();
            } catch (e) {
                console.error('Failed to get local IP:', e);
            }
            
            info.innerHTML = html;
        }

        // Generate TURN credentials
        function generateTurnCredentials() {
            const timestamp = Math.floor(Date.now() / 1000) + 86400;
            const username = `${timestamp}:testuser${Math.random().toString(36).substr(2, 9)}`;
            
            // Simple credential generation (matches server logic)
            const encoder = new TextEncoder();
            const data = encoder.encode(username + TURN_CONFIG.secret);
            const credential = btoa(String.fromCharCode(...data));
            
            return { username, credential };
        }

        // Test direct connection (no TURN)
        async function testDirectConnection() {
            resetStats();
            addResult('Testing direct connection (STUN only)...', 'info');
            
            const pc = new RTCPeerConnection({
                iceServers: [
                    { urls: 'stun:stun.l.google.com:19302' },
                    { urls: 'stun:stun1.l.google.com:19302' }
                ]
            });
            
            await performConnectionTest(pc, 'Direct/STUN');
        }

        // Test TURN only connection
        async function testTurnOnly() {
            resetStats();
            addResult('Testing TURN relay only...', 'info');
            
            const creds = generateTurnCredentials();
            const pc = new RTCPeerConnection({
                iceServers: [{
                    urls: [
                        `turn:${TURN_CONFIG.server}:${TURN_CONFIG.ports.udp}?transport=udp`,
                        `turn:${TURN_CONFIG.server}:${TURN_CONFIG.ports.tcp}?transport=tcp`
                    ],
                    username: creds.username,
                    credential: creds.credential
                }],
                iceTransportPolicy: 'relay'
            });
            
            await performConnectionTest(pc, 'TURN Relay');
        }

        // Test all methods
        async function testAllMethods() {
            resetStats();
            addResult('Testing all connection methods...', 'info');
            
            const creds = generateTurnCredentials();
            const pc = new RTCPeerConnection({
                iceServers: [
                    {
                        urls: [
                            `turn:${TURN_CONFIG.server}:${TURN_CONFIG.ports.udp}?transport=udp`,
                            `turn:${TURN_CONFIG.server}:${TURN_CONFIG.ports.tcp}?transport=tcp`
                        ],
                        username: creds.username,
                        credential: creds.credential
                    },
                    { urls: 'stun:stun.l.google.com:19302' },
                    { urls: 'stun:stun1.l.google.com:19302' }
                ],
                iceTransportPolicy: 'all'
            });
            
            await performConnectionTest(pc, 'All Methods');
        }

        // Perform connection test
        async function performConnectionTest(pc, testName) {
            stats.startTime = Date.now();
            
            return new Promise((resolve) => {
                const timeout = setTimeout(() => {
                    addResult(`${testName}: Connection timeout after 10 seconds`, 'error');
                    analyzeResults(pc);
                    pc.close();
                    resolve();
                }, 10000);

                // Monitor ICE gathering
                pc.onicegatheringstatechange = () => {
                    console.log(`ICE gathering state: ${pc.iceGatheringState}`);
                    if (pc.iceGatheringState === 'complete') {
                        addResult(`${testName}: ICE gathering complete`, 'success');
                        updateStats();
                    }
                };

                // Monitor ICE connection
                pc.oniceconnectionstatechange = () => {
                    console.log(`ICE connection state: ${pc.iceConnectionState}`);
                    if (pc.iceConnectionState === 'connected' || pc.iceConnectionState === 'completed') {
                        stats.connectionTime = Date.now() - stats.startTime;
                        addResult(`${testName}: Connected in ${stats.connectionTime}ms`, 'success');
                        clearTimeout(timeout);
                        analyzeResults(pc);
                        setTimeout(() => {
                            pc.close();
                            resolve();
                        }, 2000);
                    } else if (pc.iceConnectionState === 'failed') {
                        addResult(`${testName}: Connection failed`, 'error');
                        clearTimeout(timeout);
                        pc.close();
                        resolve();
                    }
                };

                // Monitor candidates
                pc.onicecandidate = (event) => {
                    if (event.candidate) {
                        processCandid ```javascript
                        processCandidate(event.candidate);
                    }
                };

                // Create data channel and offer
                pc.createDataChannel('test');
                pc.createOffer().then(offer => {
                    return pc.setLocalDescription(offer);
                }).catch(err => {
                    addResult(`${testName}: Failed to create offer: ${err.message}`, 'error');
                    clearTimeout(timeout);
                    pc.close();
                    resolve();
                });
            });
        }

        // Process ICE candidate
        function processCandidate(candidate) {
            const cand = candidate.candidate;
            const candidatesDiv = document.getElementById('candidates');
            
            let type = 'unknown';
            let details = '';
            
            if (cand.includes('typ host')) {
                stats.host++;
                type = 'HOST';
                details = extractCandidateInfo(cand);
                candidatesDiv.innerHTML += `<div class="candidate">🏠 ${type}: ${details}</div>`;
            } else if (cand.includes('typ srflx')) {
                stats.srflx++;
                type = 'STUN';
                details = extractCandidateInfo(cand);
                candidatesDiv.innerHTML += `<div class="candidate">🌐 ${type}: ${details}</div>`;
            } else if (cand.includes('typ relay')) {
                stats.relay++;
                type = 'TURN';
                details = extractCandidateInfo(cand);
                candidatesDiv.innerHTML += `<div class="candidate">🔄 ${type}: ${details}</div>`;
                
                // Special success message for TURN
                addResult('✅ TURN relay candidate found - Mobile/5G should work!', 'success');
            }
            
            updateStats();
        }

        // Extract candidate information
        function extractCandidateInfo(candidate) {
            const parts = candidate.split(' ');
            const protocol = parts[2] || '';
            const ip = parts[4] || '';
            const port = parts[5] || '';
            return `${protocol.toUpperCase()} ${ip}:${port}`;
        }

        // Analyze connection results
        async function analyzeResults(pc) {
            try {
                const stats = await pc.getStats();
                let selectedPair = null;
                
                stats.forEach((report) => {
                    if (report.type === 'candidate-pair' && report.state === 'succeeded') {
                        selectedPair = report;
                    }
                });
                
                if (selectedPair) {
                    addResult(`📊 Selected candidate pair: ${selectedPair.localCandidateId} -> ${selectedPair.remoteCandidateId}`, 'info');
                    
                    // Determine connection type
                    stats.forEach((report) => {
                        if (report.type === 'local-candidate' && report.id === selectedPair.localCandidateId) {
                            let connectionType = 'Unknown';
                            if (report.candidateType === 'relay') {
                                connectionType = 'TURN Relay';
                                addResult('🔄 Using TURN relay - Good for mobile/5G!', 'success');
                            } else if (report.candidateType === 'srflx') {
                                connectionType = 'STUN (Server Reflexive)';
                                addResult('🌐 Using STUN - Good for most NATs', 'success');
                            } else if (report.candidateType === 'host') {
                                connectionType = 'Direct/Local';
                                addResult('🏠 Using direct connection', 'info');
                            }
                            
                            addResult(`Connection Type: ${connectionType}`, 'info');
                            addResult(`Protocol: ${report.protocol}`, 'info');
                            addResult(`Address: ${report.address}:${report.port}`, 'info');
                        }
                    });
                }
            } catch (err) {
                console.error('Failed to analyze results:', err);
            }
        }

        // Update statistics display
        function updateStats() {
            document.getElementById('hostCount').textContent = stats.host;
            document.getElementById('srflxCount').textContent = stats.srflx;
            document.getElementById('relayCount').textContent = stats.relay;
            if (stats.connectionTime > 0) {
                document.getElementById('connectionTime').textContent = stats.connectionTime;
            }
        }

        // Reset statistics
        function resetStats() {
            stats = { host: 0, srflx: 0, relay: 0, startTime: 0, connectionTime: 0 };
            updateStats();
            document.getElementById('connectionTime').textContent = '-';
            document.getElementById('results').innerHTML = '';
            document.getElementById('candidates').innerHTML = '';
        }

        // Add result message
        function addResult(message, type) {
            const resultsDiv = document.getElementById('results');
            const div = document.createElement('div');
            div.className = `status ${type}`;
            div.textContent = message;
            resultsDiv.appendChild(div);
            console.log(message);
        }

        // Run full test suite
        async function runFullTest() {
            resetStats();
            addResult('Starting comprehensive connectivity test...', 'info');
            
            // Test 1: Direct connection
            await testDirectConnection();
            await new Promise(resolve => setTimeout(resolve, 1000));
            
            // Test 2: TURN only
            await testTurnOnly();
            await new Promise(resolve => setTimeout(resolve, 1000));
            
            // Test 3: All methods
            await testAllMethods();
            
            // Final analysis
            addResult('--- Test Complete ---', 'info');
            if (stats.relay > 0) {
                addResult('✅ TURN server is working! Mobile/5G connections should succeed.', 'success');
            } else {
                addResult('❌ No TURN relay candidates found. Mobile/5G may fail.', 'error');
                addResult('Check: 1) TURN server is running, 2) Ports 3478 are open, 3) Credentials are correct', 'warning');
            }
        }

        // Initialize on load
        window.onload = () => {
            detectNetwork();
        };
    </script>
</body>
</html>
