# OneStreamer nginx — sanitized reference configuration
#
# This is the canonical reference for the nginx setup that fronts a OneStreamer
# deployment. Copy to /etc/nginx/sites-available/ (or wherever your distro puts
# nginx server blocks), replace YOUR_DOMAIN below, install with certbot, reload.
#
# Architecture (see docs/operations/deployment.md):
#   :443  HTTPS              -> proxies to main_backend (8443), chat_backend (8444), Strapi (1337)
#   :8443 HTTPS              main API + WebRTC signaling (Node)
#   :8444 HTTPS              chat microservice (Node)
#   :1337 HTTP               Strapi CMS (blog)
#   :3478 UDP                coturn TURN/STUN (handled outside nginx)
#   :7882 WS/HTTP            LiveKit server (Docker, reached directly — no nginx involvement)
#
# Files referenced ("/var/www/html", "/var/www/uploads") assume a build-and-copy
# deploy. Adjust paths to match your layout.
#
# LiveKit is the sole WebRTC backend (ADR-0024). The LiveKit server + ingress/
# egress run as Docker containers (ws on :7882, RTMP ingress on :1935) reached
# directly — not proxied through this nginx; clients connect via LIVEKIT_WS_URL.

# ─────────────────────────────────────────────────────────────────────────────
# Upstreams
# ─────────────────────────────────────────────────────────────────────────────

upstream main_backend {
    server 127.0.0.1:8443;
    keepalive 32;
}

upstream chat_backend {
    server 127.0.0.1:8444;
    keepalive 16;
}

# ─────────────────────────────────────────────────────────────────────────────
# HTTP :80 — ACME challenge + redirect to HTTPS
# ─────────────────────────────────────────────────────────────────────────────

server {
    listen 80;
    server_name YOUR_DOMAIN www.YOUR_DOMAIN;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
        allow all;
    }

    location / {
        return 301 https://$server_name$request_uri;
    }
}

# ─────────────────────────────────────────────────────────────────────────────
# HTTPS :443 — TLS terminator + reverse proxy
# ─────────────────────────────────────────────────────────────────────────────

server {
    listen 443 ssl http2;
    server_name YOUR_DOMAIN www.YOUR_DOMAIN;

    # TLS — Let's Encrypt / certbot default paths
    ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers
    add_header X-Frame-Options          "SAMEORIGIN"                always;
    add_header X-Content-Type-Options   "nosniff"                   always;
    add_header X-XSS-Protection         "1; mode=block"             always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Body / buffers — tuned for file uploads and large JWT-in-URL OAuth callbacks
    client_max_body_size       5G;
    client_body_timeout        300s;
    proxy_buffer_size          128k;
    proxy_buffers              4 256k;
    proxy_busy_buffers_size    256k;

    # ─────────────── OAuth (served statically; tokens land in URL) ───────────
    location /auth/success {
        root /var/www/html;
        try_files $uri /index.html;
        proxy_buffer_size       16k;
        proxy_buffers           8 16k;
        proxy_busy_buffers_size 32k;
    }

    location /auth/error {
        root /var/www/html;
        try_files $uri /index.html;
    }

    location /auth/ {
        proxy_pass https://main_backend/auth/;
    }

    # ─────────────── API (main server) ───────────────────────────────────────
    location /api/ {
        proxy_pass https://main_backend/api/;
    }

    # ─────────────── Socket.IO (main) — regex for priority over static ────────
    location ~ ^/socket\.io/ {
        proxy_pass https://main_backend;
        proxy_ssl_verify off;
        proxy_buffering off;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # WebSocket lives much longer than HTTP requests
        proxy_connect_timeout 90s;
        proxy_send_timeout    3600s;
        proxy_read_timeout    3600s;
    }

    # ─────────────── Socket.IO (chat service) ────────────────────────────────
    location ^~ /chat/socket.io/ {
        proxy_pass https://chat_backend/chat/socket.io/;
        proxy_ssl_verify off;
        proxy_buffering off;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout    3600s;
        proxy_read_timeout    3600s;
    }

    # ─────────────── Uploads ─────────────────────────────────────────────────
    # Avatars served directly off disk for cacheability
    location /uploads/avatars/ {
        alias /var/www/uploads/avatars/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location /uploads/ {
        proxy_pass https://main_backend/uploads/;
        client_max_body_size 100M;
    }

    # ─────────────── Admin endpoints (pass through auth headers) ─────────────
    location /admin/ {
        proxy_pass https://main_backend/admin/;
        proxy_set_header x-admin-key  $http_x_admin_key;
        proxy_set_header Authorization $http_authorization;
        proxy_pass_header x-admin-key;
        proxy_pass_header Authorization;
    }

    # ─────────────── Health checks ───────────────────────────────────────────
    location /health {
        proxy_pass https://main_backend/health;
        proxy_ssl_verify off;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # ─────────────── Dynamic OG-meta routes (proxy to Node SSR) ──────────────
    # Clip pages — UUID format 8-4-4-4-12 hex
    location ~ "^/clips/[a-f0-9]{8}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{12}$" {
        proxy_pass https://main_backend;
        proxy_ssl_verify off;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Blog article pages — /blog/{slug}
    location ~ "^/blog/[a-z0-9][a-z0-9-]*[a-z0-9]$" {
        proxy_pass https://main_backend;
        proxy_ssl_verify off;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ─────────────── Strapi CMS (blog backend) ───────────────────────────────
    # ^~ gives priority over the regex static-file matcher
    location ^~ /strapi/ {
        rewrite ^/strapi/?(.*)$ /$1 break;
        proxy_pass http://127.0.0.1:1337;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Prefix /strapi;
        client_max_body_size 50M;
    }

    # ─────────────── Blog SPA (static) ───────────────────────────────────────
    location /blog {
        alias /var/www/html/blog;
        index index.html;
        if (!-f $request_filename) {
            rewrite ^ /blog/index.html last;
        }
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    location = /blog/index.html {
        alias /var/www/html/blog/index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # ─────────────── Static asset cache-busting ──────────────────────────────
    location ~ \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        root /var/www/html;
        try_files $uri /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    location = /favicon.ico {
        root /var/www/html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    location = /manifest.json {
        root /var/www/html;
        add_header Cache-Control "public, max-age=3600";
    }

    # ─────────────── React app (catch-all, must be last) ─────────────────────
    location / {
        root /var/www/html;
        try_files $uri /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
