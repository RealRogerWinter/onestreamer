<!DOCTYPE html>
<html>
<head>
    <title>Turnstile Test</title>
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
</head>
<body>
    <h1>Turnstile Test Page</h1>
    <form id="test-form">
        <div class="cf-turnstile" 
             data-sitekey="0x4AAAAAABuXrP2d_bomYOGZ"
             data-callback="onTurnstileSuccess"
             data-error-callback="onTurnstileError">
        </div>
        <button type="submit" id="submit-btn" disabled>Submit</button>
    </form>
    
    <div id="result"></div>

    <script>
        function onTurnstileSuccess(token) {
            console.log('Turnstile success! Token:', token);
            document.getElementById('result').innerHTML = 'Token received: ' + token.substring(0, 20) + '...';
            document.getElementById('submit-btn').disabled = false;
        }
        
        function onTurnstileError() {
            console.error('Turnstile error!');
            document.getElementById('result').innerHTML = 'Turnstile error occurred';
        }
        
        document.getElementById('test-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const token = document.querySelector('[name="cf-turnstile-response"]').value;
            
            const response = await fetch('/auth/login', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    email: 'test@test.com',
                    password: 'test123',
                    turnstileToken: token
                })
            });
            
            const result = await response.json();
            document.getElementById('result').innerHTML = 'Server response: ' + JSON.stringify(result);
        });
    </script>
</body>
</html>
