<!DOCTYPE html>
<html>
<head>
    <title>Visual Effects Debug</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .debug-section { margin: 20px 0; padding: 15px; border: 1px solid #ccc; border-radius: 5px; }
        .test-video { width: 400px; height: 300px; background: linear-gradient(45deg, #ff6b6b, #4ecdc4); border: 2px solid #333; }
        .controls { margin: 10px 0; }
        button { padding: 8px 15px; margin: 5px; cursor: pointer; }
        .log { max-height: 200px; overflow-y: auto; background: #f5f5f5; padding: 10px; font-family: monospace; font-size: 12px; }
    </style>
</head>
<body>
    <h1>🎨 Visual Effects Debug Tool</h1>
    
    <div class="debug-section">
        <h3>1. Test Video Element</h3>
        <div class="test-video" id="testVideo">Test Video Element</div>
        <div class="controls">
            <button onclick="testTransform()">Apply scale(0.5)</button>
            <button onclick="testTransform2()">Apply scale(1.5)</button>
            <button onclick="resetTransform()">Reset Transform</button>
        </div>
    </div>
    
    <div class="debug-section">
        <h3>2. ClientVisualFxProcessor Test</h3>
        <div class="controls">
            <button onclick="loadProcessor()">Load Processor</button>
            <button onclick="testProcessorEffect()">Test stream_resize_half Effect</button>
            <button onclick="checkVideoElements()">Check Video Elements</button>
        </div>
    </div>
    
    <div class="debug-section">
        <h3>3. Socket Events Test</h3>
        <div class="controls">
            <button onclick="testSocketEvent()">Simulate visual-effect-applied Event</button>
            <button onclick="checkSocketConnection()">Check Socket Connection</button>
        </div>
    </div>
    
    <div class="debug-section">
        <h3>4. Debug Log</h3>
        <div class="log" id="debugLog"></div>
        <button onclick="clearLog()">Clear Log</button>
    </div>

    <script>
        let processor = null;
        
        function log(message) {
            const logElement = document.getElementById('debugLog');
            const timestamp = new Date().toLocaleTimeString();
            logElement.innerHTML += `[${timestamp}] ${message}\n`;
            logElement.scrollTop = logElement.scrollHeight;
            console.log(message);
        }
        
        function testTransform() {
            const video = document.getElementById('testVideo');
            video.style.transform = 'scale(0.5)';
            log('✅ Applied scale(0.5) directly to test element');
        }
        
        function testTransform2() {
            const video = document.getElementById('testVideo');
            video.style.transform = 'scale(1.5)';
            log('✅ Applied scale(1.5) directly to test element');
        }
        
        function resetTransform() {
            const video = document.getElementById('testVideo');
            video.style.transform = '';
            log('🔄 Reset transform on test element');
        }
        
        function loadProcessor() {
            // Try to load ClientVisualFxProcessor
            const script = document.createElement('script');
            script.src = '/ClientVisualFxProcessor.js';
            script.onload = () => {
                log('✅ ClientVisualFxProcessor script loaded');
                if (typeof ClientVisualFxProcessor !== 'undefined') {
                    processor = new ClientVisualFxProcessor();
                    log('✅ ClientVisualFxProcessor instance created');
                } else {
                    log('❌ ClientVisualFxProcessor class not available');
                }
            };
            script.onerror = () => {
                log('❌ Failed to load ClientVisualFxProcessor script');
            };
            document.head.appendChild(script);
        }
        
        function testProcessorEffect() {
            if (!processor) {
                log('❌ Processor not loaded. Click "Load Processor" first.');
                return;
            }
            
            // Create a mock video element
            const mockVideo = document.createElement('video');
            mockVideo.style.width = '400px';
            mockVideo.style.height = '300px';
            mockVideo.style.background = 'linear-gradient(45deg, #ff9999, #99ccff)';
            mockVideo.style.border = '2px solid #000';
            document.body.appendChild(mockVideo);
            
            // Initialize processor with mock video
            const success = processor.initialize(mockVideo);
            log(`🎬 Processor initialized: ${success}`);
            
            // Apply the stream_resize_half effect
            const result = processor.applyEffect('stream_resize_half', { duration: 10000 });
            log(`📉 Applied stream_resize_half effect: ${result}`);
            
            // Check if transform was applied
            setTimeout(() => {
                const transform = mockVideo.style.transform;
                log(`🔍 Video transform after effect: "${transform}"`);
                if (transform.includes('scale(0.5)')) {
                    log('✅ Transform applied successfully!');
                } else {
                    log('❌ Transform not applied or incorrect');
                }
            }, 100);
        }
        
        function checkVideoElements() {
            // Check for video elements on the page
            const videos = document.querySelectorAll('video');
            log(`🔍 Found ${videos.length} video elements`);
            
            videos.forEach((video, index) => {
                log(`   Video ${index + 1}: ${video.tagName} ${video.id ? '#' + video.id : ''} ${video.className ? '.' + video.className.split(' ').join('.') : ''}`);
                log(`     Size: ${video.clientWidth}x${video.clientHeight}`);
                log(`     Transform: "${video.style.transform}"`);
                log(`     Filter: "${video.style.filter}"`);
            });
            
            // Check for WebRTC video elements specifically
            const webrtcVideos = document.querySelectorAll('.webrtc-viewer video, .webrtc-streamer video');
            log(`🔍 Found ${webrtcVideos.length} WebRTC video elements`);
        }
        
        function testSocketEvent() {
            // Simulate the visual-effect-applied event
            const mockEventData = {
                effectId: 'stream_resize_half',
                duration: 10000,
                applyToStreamer: true,
                isStreamerPreview: false,
                streamId: 'test_stream_123'
            };
            
            log('🔌 Simulating visual-effect-applied event...');
            log(`   Event data: ${JSON.stringify(mockEventData, null, 2)}`);
            
            // Check if there are any existing processors that might handle this
            if (window.ClientVisualFxProcessor) {
                log('✅ ClientVisualFxProcessor available globally');
            } else {
                log('❌ ClientVisualFxProcessor not available globally');
            }
        }
        
        function checkSocketConnection() {
            // Check if socket.io is available and connected
            if (typeof io !== 'undefined' && window.socket) {
                log('✅ Socket.io available and connected');
                log(`   Socket ID: ${window.socket.id}`);
                
                // Listen for visual-effect-applied events
                window.socket.on('visual-effect-applied', (data) => {
                    log('🔌 Received visual-effect-applied event:');
                    log(`   ${JSON.stringify(data, null, 2)}`);
                });
                
                log('👂 Listening for visual-effect-applied events...');
            } else {
                log('❌ Socket.io not available or not connected');
            }
        }
        
        function clearLog() {
            document.getElementById('debugLog').innerHTML = '';
        }
        
        // Auto-run some checks on load
        window.onload = () => {
            log('🚀 Visual Effects Debug Tool loaded');
            checkVideoElements();
        };
    </script>
</body>
</html>
