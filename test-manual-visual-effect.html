<!DOCTYPE html>
<html>
<head>
    <title>Manual Visual Effect Test</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .test-area { margin: 20px 0; padding: 20px; border: 1px solid #ccc; }
        button { padding: 10px 20px; margin: 5px; cursor: pointer; }
        .test-video { 
            width: 400px; 
            height: 300px; 
            background: linear-gradient(45deg, #ff6b6b, #4ecdc4); 
            border: 2px solid #333; 
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 18px;
            transition: transform 0.3s ease;
        }
    </style>
</head>
<body>
    <h1>🎬 Manual Visual Effect Test</h1>
    
    <div class="test-area">
        <h3>Test 1: Direct CSS Transform</h3>
        <div class="test-video" id="directTestVideo">
            Direct CSS Test Video
            <br>400x300px
        </div>
        <br>
        <button onclick="applyDirectTransform()">Apply scale(0.5)</button>
        <button onclick="removeDirectTransform()">Remove Transform</button>
        <button onclick="applyDirectTransform2()">Apply scale(0.25)</button>
    </div>

    <div class="test-area">
        <h3>Test 2: Simulated ClientVisualFxProcessor</h3>
        <div class="test-video" id="simulatedVideo">
            Simulated Processor Test
            <br>400x300px
        </div>
        <br>
        <button onclick="simulateProcessorEffect()">Simulate stream_resize_half</button>
        <button onclick="clearProcessorEffect()">Clear Effect</button>
    </div>

    <div class="test-area">
        <h3>Test 3: Real Video Element</h3>
        <video id="realVideo" width="400" height="300" style="background: #333; border: 2px solid #666;" muted autoplay loop>
            <source src="data:video/mp4;base64,AAAAIGZ0eXBpc29tAAACAGlzb21pc28yYXZjMWZyZWVfbWluZGVy" type="video/mp4">
            Your browser does not support the video tag.
        </video>
        <br>
        <button onclick="applyVideoTransform()">Apply scale(0.5) to video</button>
        <button onclick="removeVideoTransform()">Remove video transform</button>
    </div>

    <div class="test-area">
        <h3>Test 4: Socket Event Simulation</h3>
        <div id="socketStatus">Socket status: Not connected</div>
        <br>
        <button onclick="simulateSocketEvent()">Simulate visual-effect-applied event</button>
        <button onclick="checkForProcessor()">Check for ClientVisualFxProcessor</button>
    </div>

    <div class="test-area">
        <h3>Debug Log</h3>
        <div id="debugLog" style="background: #f5f5f5; padding: 10px; height: 200px; overflow-y: auto; font-family: monospace; font-size: 12px;"></div>
        <button onclick="clearLog()">Clear Log</button>
    </div>

    <script>
        function log(message) {
            const logElement = document.getElementById('debugLog');
            const timestamp = new Date().toLocaleTimeString();
            logElement.innerHTML += `[${timestamp}] ${message}\n`;
            logElement.scrollTop = logElement.scrollHeight;
            console.log(`[${timestamp}] ${message}`);
        }

        function applyDirectTransform() {
            const video = document.getElementById('directTestVideo');
            video.style.transform = 'scale(0.5)';
            log('✅ Applied scale(0.5) directly to test div');
        }

        function removeDirectTransform() {
            const video = document.getElementById('directTestVideo');
            video.style.transform = '';
            log('🔄 Removed transform from test div');
        }

        function applyDirectTransform2() {
            const video = document.getElementById('directTestVideo');
            video.style.transform = 'scale(0.25)';
            log('✅ Applied scale(0.25) directly to test div');
        }

        function simulateProcessorEffect() {
            const video = document.getElementById('simulatedVideo');
            
            // Simulate what ClientVisualFxProcessor should do
            const activeTransforms = new Map();
            activeTransforms.set('stream_resize_half', 'scale(0.5)');
            
            const combinedTransform = Array.from(activeTransforms.values()).join(' ');
            video.style.transform = combinedTransform;
            
            log('🎬 Simulated ClientVisualFxProcessor applying stream_resize_half');
            log(`   Combined transform: "${combinedTransform}"`);
        }

        function clearProcessorEffect() {
            const video = document.getElementById('simulatedVideo');
            video.style.transform = '';
            log('🧹 Cleared simulated processor effect');
        }

        function applyVideoTransform() {
            const video = document.getElementById('realVideo');
            video.style.transform = 'scale(0.5)';
            log('🎥 Applied scale(0.5) to real video element');
        }

        function removeVideoTransform() {
            const video = document.getElementById('realVideo');
            video.style.transform = '';
            log('🔄 Removed transform from real video element');
        }

        function simulateSocketEvent() {
            // Check if we can access the main app's socket
            if (window.parent && window.parent !== window) {
                // We're in an iframe, try to access parent
                try {
                    const parentSocket = window.parent.socket;
                    if (parentSocket) {
                        log('🔌 Found parent socket, emitting visual-effect-applied event');
                        parentSocket.emit('visual-effect-applied', {
                            effectId: 'stream_resize_half',
                            duration: 10000,
                            applyToStreamer: false,
                            isStreamerPreview: false,
                            streamId: 'test_stream'
                        });
                    } else {
                        log('❌ No socket found in parent window');
                    }
                } catch (error) {
                    log(`❌ Cannot access parent socket: ${error.message}`);
                }
            } else {
                // Try to simulate locally
                log('🔌 Simulating visual-effect-applied event locally');
                const eventData = {
                    effectId: 'stream_resize_half',
                    duration: 10000,
                    applyToStreamer: false,
                    isStreamerPreview: false,
                    streamId: 'test_stream'
                };
                log(`   Event data: ${JSON.stringify(eventData, null, 2)}`);
            }
        }

        function checkForProcessor() {
            // Check various locations where ClientVisualFxProcessor might be
            const checks = [
                { name: 'window.ClientVisualFxProcessor', value: window.ClientVisualFxProcessor },
                { name: 'window.parent.ClientVisualFxProcessor', value: window.parent?.ClientVisualFxProcessor },
                { name: 'typeof ClientVisualFxProcessor', value: typeof ClientVisualFxProcessor },
            ];

            log('🔍 Checking for ClientVisualFxProcessor...');
            checks.forEach(check => {
                log(`   ${check.name}: ${check.value !== undefined ? '✅ Found' : '❌ Not found'}`);
            });

            // Try to load it if not found
            if (typeof ClientVisualFxProcessor === 'undefined') {
                log('📦 Attempting to load ClientVisualFxProcessor...');
                const script = document.createElement('script');
                script.src = '/ClientVisualFxProcessor.js';
                script.onload = () => {
                    log('✅ ClientVisualFxProcessor loaded successfully');
                };
                script.onerror = () => {
                    log('❌ Failed to load ClientVisualFxProcessor');
                };
                document.head.appendChild(script);
            }
        }

        function clearLog() {
            document.getElementById('debugLog').innerHTML = '';
        }

        // Initialize
        window.onload = () => {
            log('🚀 Manual Visual Effect Test loaded');
            log('🎯 This test helps debug visual effect application');
            
            // Check socket status
            if (window.socket) {
                document.getElementById('socketStatus').textContent = `Socket status: Connected (${window.socket.id})`;
                log('🔌 Socket found and connected');
            } else {
                log('❌ No socket connection found');
            }
        };
    </script>
</body>
</html>
