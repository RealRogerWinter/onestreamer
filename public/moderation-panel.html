<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stream Moderation Panel</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: #0a0a0a;
            color: #e0e0e0;
            min-height: 100vh;
        }

        .moderation-panel {
            position: fixed;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            border: 2px solid #ff0040;
            border-radius: 12px;
            padding: 20px;
            min-width: 280px;
            box-shadow: 0 10px 40px rgba(255, 0, 64, 0.3);
            z-index: 10000;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                transform: translateX(-100%) translateY(-50%);
                opacity: 0;
            }
            to {
                transform: translateX(0) translateY(-50%);
                opacity: 1;
            }
        }

        .panel-header {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid rgba(255, 0, 64, 0.3);
        }

        .panel-title {
            font-size: 18px;
            font-weight: 600;
            color: #ff0040;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .shield-icon {
            width: 24px;
            height: 24px;
            fill: #ff0040;
        }

        .stream-info {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 20px;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .info-row:last-child {
            margin-bottom: 0;
        }

        .info-label {
            color: #888;
        }

        .info-value {
            color: #fff;
            font-weight: 500;
        }

        .streamer-ip {
            color: #ff9040;
            font-family: monospace;
        }

        .action-buttons {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .mod-button {
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            position: relative;
            overflow: hidden;
        }

        .mod-button:before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.1);
            transition: left 0.3s ease;
        }

        .mod-button:hover:before {
            left: 100%;
        }

        .disconnect-btn {
            background: linear-gradient(135deg, #ff6b00 0%, #ff3d00 100%);
            color: white;
        }

        .disconnect-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(255, 107, 0, 0.4);
        }

        .ban-btn {
            background: linear-gradient(135deg, #ff0040 0%, #cc0033 100%);
            color: white;
        }

        .ban-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(255, 0, 64, 0.4);
        }

        .mod-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }

        .button-icon {
            width: 18px;
            height: 18px;
            fill: currentColor;
        }

        .status-indicator {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
            margin-left: 8px;
            animation: pulse 2s infinite;
        }

        .status-active {
            background: #00ff00;
            box-shadow: 0 0 10px rgba(0, 255, 0, 0.5);
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.5;
            }
        }

        .no-stream {
            text-align: center;
            padding: 20px;
            color: #666;
        }

        .confirmation-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 10001;
        }

        .confirmation-modal.active {
            display: flex;
        }

        .modal-content {
            background: #1a1a2e;
            border: 2px solid #ff0040;
            border-radius: 12px;
            padding: 24px;
            max-width: 400px;
            animation: modalSlideIn 0.3s ease-out;
        }

        @keyframes modalSlideIn {
            from {
                transform: scale(0.9);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        .modal-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 12px;
            color: #ff0040;
        }

        .modal-message {
            margin-bottom: 20px;
            line-height: 1.5;
            color: #e0e0e0;
        }

        .modal-buttons {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
        }

        .modal-btn {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .modal-cancel {
            background: #333;
            color: #fff;
        }

        .modal-cancel:hover {
            background: #444;
        }

        .modal-confirm {
            background: #ff0040;
            color: white;
        }

        .modal-confirm:hover {
            background: #cc0033;
        }

        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #1a1a2e;
            border: 2px solid #00ff00;
            border-radius: 8px;
            padding: 16px 20px;
            display: none;
            animation: toastSlideIn 0.3s ease-out;
            z-index: 10002;
        }

        .toast.error {
            border-color: #ff0040;
        }

        .toast.show {
            display: block;
        }

        @keyframes toastSlideIn {
            from {
                transform: translateY(100%);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }
    </style>
</head>
<body>
    <div id="moderationPanel" class="moderation-panel">
        <div class="panel-header">
            <h2 class="panel-title">
                <svg class="shield-icon" viewBox="0 0 24 24">
                    <path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4z"/>
                </svg>
                Stream Moderation
            </h2>
        </div>

        <div id="streamInfo" class="stream-info">
            <div class="no-stream">No active stream</div>
        </div>

        <div id="actionButtons" class="action-buttons" style="display: none;">
            <button id="disconnectBtn" class="mod-button disconnect-btn">
                <svg class="button-icon" viewBox="0 0 24 24">
                    <path d="M13 3h-2v10h2V3zm4.83 2.17l-1.42 1.42C17.99 7.86 19 9.81 19 12c0 3.87-3.13 7-7 7s-7-3.13-7-7c0-2.19 1.01-4.14 2.58-5.42L6.17 5.17C4.23 6.82 3 9.26 3 12c0 4.97 4.03 9 9 9s9-4.03 9-9c0-2.74-1.23-5.18-3.17-6.83z"/>
                </svg>
                Disconnect Stream
            </button>
            <button id="banBtn" class="mod-button ban-btn">
                <svg class="button-icon" viewBox="0 0 24 24">
                    <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zM4 12c0-4.42 3.58-8 8-8 1.85 0 3.55.63 4.9 1.69L5.69 16.9C4.63 15.55 4 13.85 4 12zm8 8c-1.85 0-3.55-.63-4.9-1.69L18.31 7.1C19.37 8.45 20 10.15 20 12c0 4.42-3.58 8-8 8z"/>
                </svg>
                Ban Streamer IP
            </button>
        </div>
    </div>

    <div id="confirmationModal" class="confirmation-modal">
        <div class="modal-content">
            <h3 class="modal-title" id="modalTitle">Confirm Action</h3>
            <p class="modal-message" id="modalMessage"></p>
            <div class="modal-buttons">
                <button class="modal-btn modal-cancel" onclick="closeModal()">Cancel</button>
                <button class="modal-btn modal-confirm" id="modalConfirmBtn">Confirm</button>
            </div>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        let socket = null;
        let currentStreamData = null;
        let authToken = localStorage.getItem('token');
        let isAdmin = false;

        // Check admin status
        async function checkAdminStatus() {
            if (!authToken) {
                showToast('No authentication token found', 'error');
                document.getElementById('moderationPanel').style.display = 'none';
                return false;
            }

            try {
                const response = await fetch('/api/admin/verify', {
                    headers: {
                        'Authorization': `Bearer ${authToken}`
                    }
                });

                if (response.ok) {
                    isAdmin = true;
                    return true;
                } else {
                    showToast('Admin access required', 'error');
                    document.getElementById('moderationPanel').style.display = 'none';
                    return false;
                }
            } catch (error) {
                console.error('Failed to verify admin status:', error);
                return false;
            }
        }

        // Initialize socket connection
        function initSocket() {
            socket = io({
                auth: {
                    token: authToken
                }
            });

            socket.on('connect', () => {
                console.log('Connected to moderation socket');
                fetchCurrentStream();
            });

            socket.on('stream-started', (data) => {
                fetchCurrentStream();
            });

            socket.on('stream-ended', () => {
                updateStreamInfo(null);
            });

            socket.on('disconnect', () => {
                console.log('Disconnected from moderation socket');
            });
        }

        // Fetch current stream information
        async function fetchCurrentStream() {
            try {
                const response = await fetch('/api/stream/active', {
                    headers: {
                        'Authorization': `Bearer ${authToken}`
                    }
                });

                if (response.ok) {
                    const data = await response.json();
                    if (data.isActive) {
                        // Get additional stream details including IP
                        const detailsResponse = await fetch(`/api/admin/stream-details/${data.streamerId}`, {
                            headers: {
                                'Authorization': `Bearer ${authToken}`
                            }
                        });
                        
                        if (detailsResponse.ok) {
                            const details = await detailsResponse.json();
                            updateStreamInfo({
                                ...data,
                                ...details
                            });
                        } else {
                            updateStreamInfo(data);
                        }
                    } else {
                        updateStreamInfo(null);
                    }
                }
            } catch (error) {
                console.error('Failed to fetch stream info:', error);
                updateStreamInfo(null);
            }
        }

        // Update stream information display
        function updateStreamInfo(data) {
            currentStreamData = data;
            const streamInfo = document.getElementById('streamInfo');
            const actionButtons = document.getElementById('actionButtons');

            if (data && data.isActive) {
                streamInfo.innerHTML = `
                    <div class="info-row">
                        <span class="info-label">Streamer:</span>
                        <span class="info-value">${data.currentStreamer || data.streamerId || 'Unknown'}
                            <span class="status-indicator status-active"></span>
                        </span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">Type:</span>
                        <span class="info-value">${data.streamType || 'Standard'}</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">IP Address:</span>
                        <span class="info-value streamer-ip">${data.ipAddress || 'N/A'}</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">Duration:</span>
                        <span class="info-value" id="streamDuration">Calculating...</span>
                    </div>
                `;
                actionButtons.style.display = 'flex';
                
                // Start duration timer
                if (data.startTime) {
                    updateDuration(data.startTime);
                }
            } else {
                streamInfo.innerHTML = '<div class="no-stream">No active stream</div>';
                actionButtons.style.display = 'none';
            }
        }

        // Update stream duration
        function updateDuration(startTime) {
            const updateTimer = setInterval(() => {
                if (!currentStreamData || !currentStreamData.isActive) {
                    clearInterval(updateTimer);
                    return;
                }

                const start = new Date(startTime);
                const now = new Date();
                const diff = Math.floor((now - start) / 1000);
                
                const hours = Math.floor(diff / 3600);
                const minutes = Math.floor((diff % 3600) / 60);
                const seconds = diff % 60;
                
                const duration = hours > 0 
                    ? `${hours}h ${minutes}m ${seconds}s`
                    : minutes > 0 
                    ? `${minutes}m ${seconds}s`
                    : `${seconds}s`;
                
                const durationElement = document.getElementById('streamDuration');
                if (durationElement) {
                    durationElement.textContent = duration;
                }
            }, 1000);
        }

        // Disconnect stream
        async function disconnectStream() {
            if (!currentStreamData || !currentStreamData.streamerId) {
                showToast('No active stream to disconnect', 'error');
                return;
            }

            try {
                const response = await fetch('/api/admin/stream/disconnect', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${authToken}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        streamerId: currentStreamData.streamerId
                    })
                });

                if (response.ok) {
                    showToast('Stream disconnected successfully', 'success');
                    updateStreamInfo(null);
                } else {
                    const error = await response.json();
                    showToast(error.message || 'Failed to disconnect stream', 'error');
                }
            } catch (error) {
                console.error('Failed to disconnect stream:', error);
                showToast('Failed to disconnect stream', 'error');
            }
        }

        // Ban streamer IP
        async function banStreamerIP() {
            if (!currentStreamData || !currentStreamData.ipAddress) {
                showToast('Cannot ban - no IP address available', 'error');
                return;
            }

            try {
                const response = await fetch('/api/admin/stream/ban-ip', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${authToken}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        streamerId: currentStreamData.streamerId,
                        ip: currentStreamData.ipAddress,
                        reason: 'Banned by admin moderation'
                    })
                });

                if (response.ok) {
                    showToast('IP banned and stream terminated', 'success');
                    updateStreamInfo(null);
                } else {
                    const error = await response.json();
                    showToast(error.message || 'Failed to ban IP', 'error');
                }
            } catch (error) {
                console.error('Failed to ban IP:', error);
                showToast('Failed to ban IP', 'error');
            }
        }

        // Show confirmation modal
        function showConfirmation(title, message, onConfirm) {
            const modal = document.getElementById('confirmationModal');
            document.getElementById('modalTitle').textContent = title;
            document.getElementById('modalMessage').textContent = message;
            
            const confirmBtn = document.getElementById('modalConfirmBtn');
            confirmBtn.onclick = () => {
                closeModal();
                onConfirm();
            };
            
            modal.classList.add('active');
        }

        // Close modal
        function closeModal() {
            document.getElementById('confirmationModal').classList.remove('active');
        }

        // Show toast notification
        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast ${type} show`;
            
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        // Event listeners
        document.getElementById('disconnectBtn').addEventListener('click', () => {
            showConfirmation(
                'Disconnect Stream',
                'Are you sure you want to disconnect the current stream? The streamer will be immediately disconnected.',
                disconnectStream
            );
        });

        document.getElementById('banBtn').addEventListener('click', () => {
            showConfirmation(
                'Ban Streamer IP',
                `Are you sure you want to ban the IP address ${currentStreamData?.ipAddress}? This will disconnect the stream and prevent future connections from this IP.`,
                banStreamerIP
            );
        });

        // Initialize on page load
        document.addEventListener('DOMContentLoaded', async () => {
            const adminOk = await checkAdminStatus();
            if (adminOk) {
                initSocket();
            }
        });
    </script>
</body>
</html>
