<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OneStreamer - Enhanced Audio Streaming</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #1a1a1a;
            color: #fff;
            padding: 20px;
            margin: 0;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .controls {
            background: #2a2a2a;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .audio-settings {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
            margin: 20px 0;
        }
        .setting-group {
            background: #333;
            padding: 15px;
            border-radius: 5px;
        }
        .setting-group label {
            display: block;
            margin-bottom: 5px;
            font-size: 14px;
            color: #aaa;
        }
        .setting-group input[type="range"] {
            width: 100%;
            margin: 10px 0;
        }
        .setting-group select {
            width: 100%;
            padding: 5px;
            background: #444;
            color: #fff;
            border: 1px solid #555;
            border-radius: 3px;
        }
        button {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            margin: 5px;
        }
        button:hover {
            background: #45a049;
        }
        button:disabled {
            background: #666;
            cursor: not-allowed;
        }
        #stopBtn {
            background: #f44336;
        }
        #stopBtn:hover {
            background: #da190b;
        }
        video {
            width: 100%;
            max-width: 800px;
            background: #000;
            border-radius: 8px;
        }
        .status {
            background: #2a2a2a;
            padding: 10px;
            border-radius: 5px;
            margin: 10px 0;
        }
        .meter-container {
            background: #222;
            height: 20px;
            border-radius: 10px;
            overflow: hidden;
            margin: 10px 0;
        }
        .meter-bar {
            height: 100%;
            background: linear-gradient(to right, #4CAF50, #8BC34A, #FFEB3B, #FF9800, #f44336);
            width: 0%;
            transition: width 0.1s;
        }
        .log {
            background: #1a1a1a;
            border: 1px solid #333;
            padding: 10px;
            height: 200px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 12px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>OneStreamer - Enhanced Audio Streaming</h1>
        
        <div class="controls">
            <h2>Stream Controls</h2>
            <button id="startBtn">Start Streaming</button>
            <button id="stopBtn" disabled>Stop Streaming</button>
            <button id="applySettingsBtn">Apply Audio Settings</button>
        </div>

        <div class="audio-settings">
            <div class="setting-group">
                <label>Echo Cancellation</label>
                <select id="echoCancellation">
                    <option value="false" selected>Disabled (Raw Audio)</option>
                    <option value="true">Enabled</option>
                </select>
            </div>

            <div class="setting-group">
                <label>Noise Suppression</label>
                <select id="noiseSuppression">
                    <option value="false" selected>Disabled (Raw Audio)</option>
                    <option value="true">Enabled</option>
                </select>
            </div>

            <div class="setting-group">
                <label>Auto Gain Control</label>
                <select id="autoGainControl">
                    <option value="false" selected>Disabled (Raw Audio)</option>
                    <option value="true">Enabled</option>
                </select>
            </div>

            <div class="setting-group">
                <label>Sample Rate</label>
                <select id="sampleRate">
                    <option value="48000">48 kHz (Studio Quality)</option>
                    <option value="44100">44.1 kHz (CD Quality)</option>
                    <option value="32000">32 kHz (Broadcast)</option>
                    <option value="16000">16 kHz (Speech)</option>
                </select>
            </div>

            <div class="setting-group">
                <label>Sample Size</label>
                <select id="sampleSize">
                    <option value="16">16 bit (Standard)</option>
                    <option value="24">24 bit (High Quality)</option>
                    <option value="32">32 bit (Professional)</option>
                </select>
            </div>

            <div class="setting-group">
                <label>Channel Count</label>
                <select id="channelCount">
                    <option value="1">Mono</option>
                    <option value="2">Stereo</option>
                </select>
            </div>

            <div class="setting-group">
                <label>Audio Bitrate (kbps)</label>
                <input type="range" id="audioBitrate" min="32" max="320" value="128" />
                <span id="bitrateValue">128 kbps</span>
            </div>

            <div class="setting-group">
                <label>Latency Mode</label>
                <select id="latencyMode">
                    <option value="interactive">Interactive (Low Latency)</option>
                    <option value="balanced">Balanced</option>
                    <option value="playback">Playback (High Quality)</option>
                </select>
            </div>
        </div>

        <div class="status">
            <h3>Audio Level Monitor</h3>
            <div class="meter-container">
                <div class="meter-bar" id="audioMeter"></div>
            </div>
            <p>Current Level: <span id="audioLevel">0</span> dB</p>
        </div>

        <video id="localVideo" autoplay muted playsinline></video>

        <div class="log" id="log"></div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        let localStream = null;
        let socket = null;
        let audioContext = null;
        let analyser = null;
        let microphone = null;
        let javascriptNode = null;
        let peerConnection = null;
        let isStreaming = false;

        // Audio settings state - ALL DISABLED for raw audio
        const audioSettings = {
            echoCancellation: false,
            noiseSuppression: false,
            autoGainControl: false,
            sampleRate: 48000,
            sampleSize: 16,
            channelCount: 2,
            audioBitrate: 128000,
            latencyMode: 'interactive'
        };

        // DOM elements
        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const applySettingsBtn = document.getElementById('applySettingsBtn');
        const localVideo = document.getElementById('localVideo');
        const logDiv = document.getElementById('log');
        const audioMeter = document.getElementById('audioMeter');
        const audioLevelSpan = document.getElementById('audioLevel');

        // Update bitrate display
        document.getElementById('audioBitrate').addEventListener('input', (e) => {
            document.getElementById('bitrateValue').textContent = e.target.value + ' kbps';
            audioSettings.audioBitrate = parseInt(e.target.value) * 1000;
        });

        // Load settings from UI
        function loadSettingsFromUI() {
            audioSettings.echoCancellation = document.getElementById('echoCancellation').value === 'true';
            audioSettings.noiseSuppression = document.getElementById('noiseSuppression').value === 'true';
            audioSettings.autoGainControl = document.getElementById('autoGainControl').value === 'true';
            audioSettings.sampleRate = parseInt(document.getElementById('sampleRate').value);
            audioSettings.sampleSize = parseInt(document.getElementById('sampleSize').value);
            audioSettings.channelCount = parseInt(document.getElementById('channelCount').value);
            audioSettings.latencyMode = document.getElementById('latencyMode').value;
        }

        function log(message) {
            const timestamp = new Date().toLocaleTimeString();
            logDiv.innerHTML += `[${timestamp}] ${message}<br>`;
            logDiv.scrollTop = logDiv.scrollHeight;
        }

        async function startStreaming() {
            try {
                loadSettingsFromUI();
                log('Starting stream with enhanced audio settings...');
                
                // Enhanced audio constraints
                const constraints = {
                    video: {
                        width: { ideal: 1280 },
                        height: { ideal: 720 },
                        frameRate: { ideal: 30 }
                    },
                    audio: {
                        echoCancellation: audioSettings.echoCancellation,
                        noiseSuppression: audioSettings.noiseSuppression,
                        autoGainControl: audioSettings.autoGainControl,
                        sampleRate: audioSettings.sampleRate,
                        sampleSize: audioSettings.sampleSize,
                        channelCount: audioSettings.channelCount,
                        latency: audioSettings.latencyMode === 'interactive' ? 0 : 
                                 audioSettings.latencyMode === 'balanced' ? 0.01 : 0.05,
                        
                        // ALL processing DISABLED for raw audio
                        googEchoCancellation: false,
                        googAutoGainControl: false,
                        googNoiseSuppression: false,
                        googHighpassFilter: false,
                        googTypingNoiseDetection: false,
                        
                        // Disable all audio processing
                        googAudioMirroring: false,
                        googNoiseReduction: false
                    }
                };

                log(`Audio constraints: ${JSON.stringify(constraints.audio, null, 2)}`);
                
                localStream = await navigator.mediaDevices.getUserMedia(constraints);
                localVideo.srcObject = localStream;
                
                // Setup audio monitoring
                setupAudioMonitoring(localStream);
                
                // Connect to server
                socket = io();
                
                socket.on('connect', () => {
                    log('Connected to server');
                    socket.emit('request-to-stream', { 
                        streamType: 'enhanced-audio',
                        audioSettings: audioSettings
                    });
                });

                socket.on('stream-approved', async (data) => {
                    log('Stream approved by server');
                    await setupWebRTC();
                });

                socket.on('error', (error) => {
                    log(`Error: ${error}`);
                });

                isStreaming = true;
                startBtn.disabled = true;
                stopBtn.disabled = false;
                
                log('Stream started successfully with enhanced audio');
                
            } catch (error) {
                log(`Error starting stream: ${error.message}`);
                console.error(error);
            }
        }

        async function setupWebRTC() {
            // This would contain the WebRTC setup code
            // Similar to what's in webrtc-browser-test.html but with enhanced audio
            log('WebRTC setup would go here...');
        }

        function setupAudioMonitoring(stream) {
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
            analyser = audioContext.createAnalyser();
            microphone = audioContext.createMediaStreamSource(stream);
            javascriptNode = audioContext.createScriptProcessor(2048, 1, 1);

            analyser.smoothingTimeConstant = 0.8;
            analyser.fftSize = 1024;

            microphone.connect(analyser);
            analyser.connect(javascriptNode);
            javascriptNode.connect(audioContext.destination);

            javascriptNode.onaudioprocess = function() {
                const array = new Uint8Array(analyser.frequencyBinCount);
                analyser.getByteFrequencyData(array);
                
                let values = 0;
                const length = array.length;
                for (let i = 0; i < length; i++) {
                    values += array[i];
                }
                
                const average = values / length;
                const level = Math.round(average);
                const db = 20 * Math.log10(average / 255);
                
                audioMeter.style.width = (level / 2.55) + '%';
                audioLevelSpan.textContent = db.toFixed(1);
            };
        }

        function stopStreaming() {
            if (localStream) {
                localStream.getTracks().forEach(track => track.stop());
                localStream = null;
            }
            
            if (audioContext) {
                audioContext.close();
                audioContext = null;
            }
            
            if (socket) {
                socket.disconnect();
                socket = null;
            }
            
            if (peerConnection) {
                peerConnection.close();
                peerConnection = null;
            }
            
            localVideo.srcObject = null;
            audioMeter.style.width = '0%';
            audioLevelSpan.textContent = '0';
            
            isStreaming = false;
            startBtn.disabled = false;
            stopBtn.disabled = true;
            
            log('Stream stopped');
        }

        async function applySettings() {
            if (isStreaming) {
                log('Applying new audio settings...');
                stopStreaming();
                setTimeout(() => {
                    startStreaming();
                }, 500);
            } else {
                loadSettingsFromUI();
                log('Settings saved. Will be applied on next stream.');
            }
        }

        // Event listeners
        startBtn.addEventListener('click', startStreaming);
        stopBtn.addEventListener('click', stopStreaming);
        applySettingsBtn.addEventListener('click', applySettings);

        // Log initial state
        log('Enhanced audio streaming client ready');
        log('Recommended settings loaded for optimal audio capture');
    </script>
</body>
</html>
