<!DOCTYPE html>
<html>
<head>
    <title>Socket Singleton Test</title>
    <style>
        body {
            font-family: monospace;
            padding: 20px;
            background: #1a1a1a;
            color: #00ff00;
        }
        button {
            padding: 10px 20px;
            margin: 10px;
            background: #333;
            color: #00ff00;
            border: 1px solid #00ff00;
            cursor: pointer;
        }
        button:hover {
            background: #444;
        }
        .log {
            background: #0a0a0a;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #333;
            max-height: 400px;
            overflow-y: auto;
        }
        .status {
            padding: 10px;
            background: #0f0f0f;
            border: 2px solid #00ffff;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <h1>🔌 Socket Singleton Test</h1>
    
    <div class="status">
        <h3>Status:</h3>
        <div id="status">Ready to test...</div>
    </div>
    
    <div>
        <button onclick="testSingleton()">Test Singleton Pattern</button>
        <button onclick="simulateReactBehavior()">Simulate React StrictMode</button>
        <button onclick="checkConnections()">Check Server Connections</button>
        <button onclick="clearAll()">Clear All</button>
    </div>
    
    <div class="log">
        <h3>Log:</h3>
        <div id="log"></div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        let logDiv = document.getElementById('log');
        let statusDiv = document.getElementById('status');
        let socketManager = null;
        
        function log(message) {
            const time = new Date().toLocaleTimeString();
            logDiv.innerHTML += `[${time}] ${message}<br>`;
            logDiv.scrollTop = logDiv.scrollHeight;
            console.log(message);
        }
        
        // Singleton Socket Manager
        class SocketManager {
            constructor() {
                if (SocketManager.instance) {
                    log('⚠️ Returning existing SocketManager instance');
                    return SocketManager.instance;
                }
                
                log('✅ Creating new SocketManager instance');
                this.mainSocket = null;
                this.chatSocket = null;
                this.creationCount = { main: 0, chat: 0 };
                SocketManager.instance = this;
            }
            
            getMainSocket() {
                if (!this.mainSocket) {
                    this.creationCount.main++;
                    log(`🔌 Creating main socket (Attempt #${this.creationCount.main})`);
                    
                    this.mainSocket = io('http://localhost:8080', {
                        forceNew: false,
                        transports: ['websocket', 'polling']
                    });
                    
                    this.mainSocket.on('connect', () => {
                        log(`✅ Main socket connected: ${this.mainSocket.id}`);
                        updateStatus();
                    });
                    
                    this.mainSocket.on('disconnect', () => {
                        log(`❌ Main socket disconnected`);
                        updateStatus();
                    });
                } else {
                    log(`♻️ Reusing main socket: ${this.mainSocket.id}`);
                }
                
                return this.mainSocket;
            }
            
            getChatSocket() {
                if (!this.chatSocket) {
                    this.creationCount.chat++;
                    log(`💬 Creating chat socket (Attempt #${this.creationCount.chat})`);
                    
                    this.chatSocket = io('http://localhost:8081', {
                        forceNew: false,
                        transports: ['websocket', 'polling']
                    });
                    
                    this.chatSocket.on('connect', () => {
                        log(`✅ Chat socket connected: ${this.chatSocket.id}`);
                        updateStatus();
                    });
                    
                    this.chatSocket.on('disconnect', () => {
                        log(`❌ Chat socket disconnected`);
                        updateStatus();
                    });
                } else {
                    log(`♻️ Reusing chat socket: ${this.chatSocket.id}`);
                }
                
                return this.chatSocket;
            }
            
            getStats() {
                return {
                    mainCreated: this.creationCount.main,
                    chatCreated: this.creationCount.chat,
                    mainConnected: this.mainSocket?.connected || false,
                    chatConnected: this.chatSocket?.connected || false,
                    mainId: this.mainSocket?.id || 'none',
                    chatId: this.chatSocket?.id || 'none'
                };
            }
        }
        
        function updateStatus() {
            if (!socketManager) return;
            
            const stats = socketManager.getStats();
            statusDiv.innerHTML = `
                <strong>Main Socket:</strong> ${stats.mainConnected ? '🟢 Connected' : '🔴 Disconnected'} (ID: ${stats.mainId})<br>
                <strong>Chat Socket:</strong> ${stats.chatConnected ? '🟢 Connected' : '🔴 Disconnected'} (ID: ${stats.chatId})<br>
                <strong>Creation Attempts:</strong> Main: ${stats.mainCreated}, Chat: ${stats.chatCreated}<br>
                <strong>Expected:</strong> Main: 1, Chat: 1
            `;
        }
        
        function testSingleton() {
            log('\n🧪 Testing Singleton Pattern...\n');
            
            // Create multiple instances
            log('Creating first SocketManager...');
            const manager1 = new SocketManager();
            
            log('Creating second SocketManager...');
            const manager2 = new SocketManager();
            
            log('Creating third SocketManager...');
            const manager3 = new SocketManager();
            
            // Test if they're the same
            if (manager1 === manager2 && manager2 === manager3) {
                log('✅ SUCCESS: All managers are the same instance!');
            } else {
                log('❌ FAILURE: Different instances created!');
            }
            
            // Get sockets
            log('\nGetting sockets from manager1...');
            manager1.getMainSocket();
            manager1.getChatSocket();
            
            log('\nGetting sockets from manager2...');
            manager2.getMainSocket();
            manager2.getChatSocket();
            
            log('\nGetting sockets from manager3...');
            manager3.getMainSocket();
            manager3.getChatSocket();
            
            socketManager = manager1;
            
            setTimeout(updateStatus, 1000);
        }
        
        function simulateReactBehavior() {
            log('\n🔄 Simulating React StrictMode behavior...\n');
            
            // Simulate component mount
            log('=== Component Mount 1 ===');
            const manager1 = new SocketManager();
            manager1.getMainSocket();
            manager1.getChatSocket();
            
            // Simulate component unmount (but don't disconnect sockets)
            log('\n=== Component Unmount 1 ===');
            // In React, component unmounts but sockets persist
            
            // Simulate component remount
            log('\n=== Component Mount 2 (StrictMode) ===');
            const manager2 = new SocketManager();
            manager2.getMainSocket();
            manager2.getChatSocket();
            
            socketManager = manager2;
            
            setTimeout(() => {
                updateStatus();
                
                const stats = socketManager.getStats();
                if (stats.mainCreated === 1 && stats.chatCreated === 1) {
                    log('\n✅ SUCCESS: Sockets were reused correctly!');
                } else {
                    log(`\n❌ FAILURE: Too many creation attempts! Main: ${stats.mainCreated}, Chat: ${stats.chatCreated}`);
                }
            }, 1000);
        }
        
        async function checkConnections() {
            log('\n📊 Checking server connections...\n');
            
            try {
                const response = await fetch('http://localhost:8080/api/admin/connections');
                if (response.ok) {
                    const data = await response.json();
                    log(`Server reports: ${data.totalConnections} total connections`);
                } else {
                    log('Could not fetch server connections (API may not be available)');
                }
            } catch (error) {
                log('Error fetching connections: ' + error.message);
            }
        }
        
        function clearAll() {
            log('\n🧹 Clearing all...\n');
            
            if (socketManager) {
                if (socketManager.mainSocket) {
                    socketManager.mainSocket.disconnect();
                    socketManager.mainSocket = null;
                }
                if (socketManager.chatSocket) {
                    socketManager.chatSocket.disconnect();
                    socketManager.chatSocket = null;
                }
            }
            
            SocketManager.instance = null;
            socketManager = null;
            
            logDiv.innerHTML = '';
            statusDiv.innerHTML = 'Cleared - ready to test again';
        }
        
        log('Test page loaded. Click buttons to test socket behavior.');
    </script>
</body>
</html>
