<!DOCTYPE html>
<html>
<head>
    <title>WebRTC Browser Test</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .container { display: flex; gap: 20px; }
        .tab { border: 1px solid #ccc; padding: 20px; width: 400px; }
        video { width: 300px; height: 200px; border: 1px solid #000; }
        .logs { height: 200px; overflow-y: auto; border: 1px solid #ccc; padding: 10px; font-size: 12px; }
        .status { color: green; font-weight: bold; }
        .error { color: red; font-weight: bold; }
        button { margin: 5px; padding: 10px; }
    </style>
</head>
<body>
    <h1>🧪 OneStreamer WebRTC Test</h1>
    
    <div class="container">
        <div class="tab">
            <h2>🎥 Streamer Tab</h2>
            <video id="localVideo" autoplay muted></video>
            <br>
            <button onclick="startStreaming()">Start Streaming</button>
            <button onclick="stopStreaming()">Stop Streaming</button>
            <div id="streamerStatus">Not streaming</div>
            <div id="streamerLogs" class="logs"></div>
        </div>
        
        <div class="tab">
            <h2>👁️ Viewer Tab</h2>
            <video id="remoteVideo" autoplay></video>
            <br>
            <div id="viewerStatus">Waiting for stream...</div>
            <div id="viewerLogs" class="logs"></div>
        </div>
    </div>
    
    <script>
        // Create separate socket connections for streamer and viewer
        const streamerSocket = io();
        const viewerSocket = io();
        
        let localStream = null;
        let viewerPeerConnection = null;
        let streamerPeerConnections = new Map();
        
        function log(type, message) {
            const timestamp = new Date().toLocaleTimeString();
            const logMessage = `[${timestamp}] ${message}`;
            
            const streamerLogs = document.getElementById('streamerLogs');
            const viewerLogs = document.getElementById('viewerLogs');
            
            if (type === 'streamer') {
                streamerLogs.innerHTML += logMessage + '<br>';
                streamerLogs.scrollTop = streamerLogs.scrollHeight;
            } else if (type === 'viewer') {
                viewerLogs.innerHTML += logMessage + '<br>';
                viewerLogs.scrollTop = viewerLogs.scrollHeight;
            } else {
                // Both
                streamerLogs.innerHTML += logMessage + '<br>';
                viewerLogs.innerHTML += logMessage + '<br>';
                streamerLogs.scrollTop = streamerLogs.scrollHeight;
                viewerLogs.scrollTop = viewerLogs.scrollHeight;
            }
        }
        
        // Streamer Socket Events
        streamerSocket.on('connect', () => {
            log('streamer', `✅ Streamer connected: ${streamerSocket.id}`);
        });
        
        streamerSocket.on('streaming-approved', () => {
            log('streamer', '✅ Streaming approved!');
            document.getElementById('streamerStatus').innerHTML = '<span class="status">STREAMING LIVE</span>';
        });
        
        streamerSocket.on('viewer-requesting-stream', async (data) => {
            log('streamer', `👁️ Viewer ${data.viewerId} requesting stream`);
            
            if (!localStream) {
                log('streamer', '❌ No local stream available');
                return;
            }
            
            try {
                const peerConnection = new RTCPeerConnection({
                    iceServers: [
                        { urls: 'stun:stun.l.google.com:19302' },
                        { urls: 'stun:stun1.l.google.com:19302' }
                    ]
                });
                
                streamerPeerConnections.set(data.viewerId, peerConnection);
                
                localStream.getTracks().forEach(track => {
                    peerConnection.addTrack(track, localStream);
                });
                
                peerConnection.onicecandidate = (event) => {
                    if (event.candidate) {
                        log('streamer', `🧊 Sending ICE candidate to ${data.viewerId}`);
                        streamerSocket.emit('ice-candidate', {
                            candidate: event.candidate,
                            toSocketId: data.viewerId,
                            fromSocketId: streamerSocket.id
                        });
                    }
                };
                
                peerConnection.onconnectionstatechange = () => {
                    log('streamer', `🔗 Connection to ${data.viewerId}: ${peerConnection.connectionState}`);
                };
                
                const offer = await peerConnection.createOffer();
                await peerConnection.setLocalDescription(offer);
                
                log('streamer', `📤 Sending offer to ${data.viewerId}`);
                streamerSocket.emit('stream-offer', {
                    offer,
                    toViewerId: data.viewerId
                });
                
            } catch (error) {
                log('streamer', `❌ Error creating offer: ${error.message}`);
            }
        });
        
        streamerSocket.on('stream-answer', async (data) => {
            log('streamer', `📨 Got answer from ${data.fromViewerId}`);
            
            const peerConnection = streamerPeerConnections.get(data.fromViewerId);
            if (peerConnection) {
                try {
                    await peerConnection.setRemoteDescription(new RTCSessionDescription(data.answer));
                    log('streamer', `✅ Set remote description for ${data.fromViewerId}`);
                } catch (error) {
                    log('streamer', `❌ Error setting remote description: ${error.message}`);
                }
            }
        });
        
        streamerSocket.on('ice-candidate', async (data) => {
            const peerConnection = streamerPeerConnections.get(data.fromSocketId);
            if (peerConnection && data.candidate) {
                try {
                    await peerConnection.addIceCandidate(new RTCIceCandidate(data.candidate));
                    log('streamer', `🧊 Added ICE candidate from ${data.fromSocketId}`);
                } catch (error) {
                    log('streamer', `❌ Error adding ICE candidate: ${error.message}`);
                }
            }
        });
        
        // Viewer Socket Events
        viewerSocket.on('connect', () => {
            log('viewer', `✅ Viewer connected: ${viewerSocket.id}`);
            viewerSocket.emit('join-as-viewer');
        });
        
        viewerSocket.on('new-streamer', (data) => {
            log('viewer', `📡 New streamer: ${data.streamerId}`);
            
            if (data.streamerId !== viewerSocket.id) {
                // Request stream from new streamer
                log('viewer', `📡 Requesting stream from ${data.streamerId}`);
                setupViewerPeerConnection();
                viewerSocket.emit('request-stream', { streamerId: data.streamerId });
            }
        });
        
        viewerSocket.on('stream-offer', async (data) => {
            log('viewer', `📨 Got offer from ${data.fromStreamerId}`);
            
            if (viewerPeerConnection) {
                try {
                    await viewerPeerConnection.setRemoteDescription(new RTCSessionDescription(data.offer));
                    
                    const answer = await viewerPeerConnection.createAnswer();
                    await viewerPeerConnection.setLocalDescription(answer);
                    
                    log('viewer', `📤 Sending answer to ${data.fromStreamerId}`);
                    viewerSocket.emit('stream-answer', {
                        answer,
                        toStreamerId: data.fromStreamerId,
                        fromViewerId: viewerSocket.id
                    });
                } catch (error) {
                    log('viewer', `❌ Error handling offer: ${error.message}`);
                }
            }
        });
        
        viewerSocket.on('ice-candidate', async (data) => {
            if (viewerPeerConnection && data.candidate) {
                try {
                    await viewerPeerConnection.addIceCandidate(new RTCIceCandidate(data.candidate));
                    log('viewer', `🧊 Added ICE candidate from ${data.fromSocketId}`);
                } catch (error) {
                    log('viewer', `❌ Error adding ICE candidate: ${error.message}`);
                }
            }
        });
        
        function setupViewerPeerConnection() {
            viewerPeerConnection = new RTCPeerConnection({
                iceServers: [
                    { urls: 'stun:stun.l.google.com:19302' },
                    { urls: 'stun:stun1.l.google.com:19302' }
                ]
            });
            
            viewerPeerConnection.ontrack = (event) => {
                log('viewer', '🎥 Received remote stream!');
                const remoteVideo = document.getElementById('remoteVideo');
                remoteVideo.srcObject = event.streams[0];
                document.getElementById('viewerStatus').innerHTML = '<span class="status">RECEIVING STREAM</span>';
            };
            
            viewerPeerConnection.onicecandidate = (event) => {
                if (event.candidate) {
                    log('viewer', '🧊 Sending ICE candidate to streamer');
                    viewerSocket.emit('ice-candidate', {
                        candidate: event.candidate,
                        fromSocketId: viewerSocket.id,
                        toSocketId: 'streamer' // Will be routed to current streamer
                    });
                }
            };
            
            viewerPeerConnection.onconnectionstatechange = () => {
                log('viewer', `🔗 Connection state: ${viewerPeerConnection.connectionState}`);
            };
        }
        
        async function startStreaming() {
            try {
                // Get raw audio without any processing
                const audioConstraints = {
                    echoCancellation: false,
                    noiseSuppression: false,
                    autoGainControl: false,
                    sampleRate: 48000,
                    channelCount: 2,
                    // Chrome-specific
                    googEchoCancellation: false,
                    googAutoGainControl: false,
                    googNoiseSuppression: false,
                    googHighpassFilter: false,
                    googTypingNoiseDetection: false,
                    googNoiseReduction: false
                };
                
                localStream = await navigator.mediaDevices.getUserMedia({ 
                    video: true, 
                    audio: audioConstraints 
                });
                document.getElementById('localVideo').srcObject = localStream;
                
                log('streamer', '📷 Got local stream');
                streamerSocket.emit('request-to-stream', { streamType: 'webcam' });
                
            } catch (error) {
                log('streamer', `❌ Error accessing camera: ${error.message}`);
            }
        }
        
        function stopStreaming() {
            if (localStream) {
                localStream.getTracks().forEach(track => track.stop());
                localStream = null;
            }
            
            streamerPeerConnections.forEach(pc => pc.close());
            streamerPeerConnections.clear();
            
            streamerSocket.emit('stop-streaming');
            document.getElementById('streamerStatus').innerHTML = 'Not streaming';
            log('streamer', '🛑 Stopped streaming');
        }
        
        // Initialize viewer
        setTimeout(() => {
            log('both', '🔧 Test initialized - ready to test streaming');
        }, 1000);
    </script>
</body>
</html>
