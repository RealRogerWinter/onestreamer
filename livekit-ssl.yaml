port: 7881
bind_addresses:
  - "127.0.0.1"
log_level: info
rtc:
  tcp_port: 7882
  port_range_start: 50000
  port_range_end: 60000
  use_external_ip: true
turn:
  enabled: true
  domain: onestreamer.live
  tls_port: 5349
  cert_file: /etc/letsencrypt/live/onestreamer.live/fullchain.pem
  key_file: /etc/letsencrypt/live/onestreamer.live/privkey.pem
keys:
  devkey: secretsecretsecretsecretsecretsecret
room:
  auto_create: true
  empty_timeout: 300
  max_participants: 1000
  enable_remote_unmute: true
webhook:
  urls: []