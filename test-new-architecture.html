<!DOCTYPE html>
<html>
<head>
    <title>OneStreamer New Architecture Test</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; max-width: 1200px; margin: 0 auto; }
        .section { margin-bottom: 30px; padding: 20px; border: 1px solid #ddd; border-radius: 8px; }
        .status { font-weight: bold; margin: 10px 0; }
        .success { color: green; }
        .error { color: red; }
        .info { color: blue; }
        video { max-width: 400px; border: 1px solid #ccc; margin: 10px 0; background: #000; }
        button { margin: 5px; padding: 8px 16px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background: #0056b3; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        pre { background: #f5f5f5; padding: 10px; border-radius: 4px; overflow-x: auto; }
        .log { height: 200px; overflow-y: auto; background: #f8f9fa; padding: 10px; border-radius: 4px; font-family: monospace; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
</head>
<body>
    <h1>🚀 OneStreamer New Architecture Test</h1>
    <p>Testing the WebRTC → Server → HLS streaming architecture</p>
    
    <div class="section">
        <h2>🔗 Server Connection</h2>
        <button onclick="testConnection()">Test Server Connection</button>
        <div id="connection-status"></div>
    </div>
    
    <div class="grid">
        <div class="section">
            <h2>📹 Mock Stream Test</h2>
            <button onclick="startMockStream()" id="start-btn">Start Mock Stream</button>
            <button onclick="stopMockStream()" id="stop-btn" disabled>Stop Mock Stream</button>
            <div id="stream-status"></div>
        </div>
        
        <div class="section">
            <h2>📺 HLS Viewer Test</h2>
            <button onclick="watchStream()" id="watch-btn">Watch Stream</button>
            <button onclick="stopWatching()" id="unwatch-btn" disabled>Stop Watching</button>
            <video id="hlsVideo" controls muted style="width: 100%; max-width: 400px;"></video>
            <div id="viewer-status"></div>
        </div>
    </div>
    
    <div class="section">
        <h2>📊 Stream Information</h2>
        <button onclick="getStreamInfo()">Refresh Stream Info</button>
        <pre id="stream-info"></pre>
    </div>
    
    <div class="section">
        <h2>📝 Activity Log</h2>
        <button onclick="clearLog()">Clear Log</button>
        <div id="log" class="log"></div>
    </div>
    
    <script>
        let currentStreamId = null;
        let hlsPlayer = null;
        let statusInterval = null;
        
        function log(message, type = 'info') {
            const logDiv = document.getElementById('log');
            const timestamp = new Date().toLocaleTimeString();
            const logEntry = document.createElement('div');
            logEntry.className = type;
            logEntry.textContent = `[${timestamp}] ${message}`;
            logDiv.appendChild(logEntry);
            logDiv.scrollTop = logDiv.scrollHeight;
            console.log(`[${type.toUpperCase()}] ${message}`);
        }
        
        function clearLog() {
            document.getElementById('log').innerHTML = '';
        }
        
        async function testConnection() {
            const statusDiv = document.getElementById('connection-status');
            try {
                log('Testing server connection...');
                const response = await fetch('http://localhost:8080/health');
                const data = await response.json();
                statusDiv.innerHTML = `<div class="status success">✅ Server online: ${data.status}</div>`;
                log('Server connection successful', 'success');
            } catch (error) {
                statusDiv.innerHTML = `<div class="status error">❌ Server offline: ${error.message}</div>`;
                log(`Server connection failed: ${error.message}`, 'error');
            }
        }
        
        async function startMockStream() {
            const statusDiv = document.getElementById('stream-status');
            const startBtn = document.getElementById('start-btn');
            const stopBtn = document.getElementById('stop-btn');
            
            try {
                log('Starting mock stream...');
                startBtn.disabled = true;
                
                const response = await fetch('http://localhost:8080/api/media/start-ingestion', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ streamerId: 'test-streamer-' + Date.now() })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    currentStreamId = result.streamId;
                    statusDiv.innerHTML = `<div class="status success">✅ Mock stream started<br>Stream ID: ${result.streamId}</div>`;
                    log(`Mock stream started: ${result.streamId}`, 'success');
                    
                    startBtn.disabled = true;
                    stopBtn.disabled = false;
                    
                    // Auto-refresh stream info
                    statusInterval = setInterval(getStreamInfo, 2000);
                } else {
                    throw new Error(result.message || 'Unknown error');
                }
            } catch (error) {
                statusDiv.innerHTML = `<div class="status error">❌ Failed: ${error.message}</div>`;
                log(`Mock stream start failed: ${error.message}`, 'error');
                startBtn.disabled = false;
            }
        }
        
        async function stopMockStream() {
            const statusDiv = document.getElementById('stream-status');
            const startBtn = document.getElementById('start-btn');
            const stopBtn = document.getElementById('stop-btn');
            
            try {
                log('Stopping mock stream...');
                const response = await fetch('http://localhost:8080/api/media/stop-ingestion', {
                    method: 'POST'
                });
                
                const result = await response.json();
                
                if (result.success) {
                    statusDiv.innerHTML = `<div class="status info">Stream stopped</div>`;
                    log('Mock stream stopped', 'success');
                    currentStreamId = null;
                } else {
                    throw new Error('Failed to stop stream');
                }
            } catch (error) {
                statusDiv.innerHTML = `<div class="status error">❌ Stop failed: ${error.message}</div>`;
                log(`Stop stream failed: ${error.message}`, 'error');
            } finally {
                startBtn.disabled = false;
                stopBtn.disabled = true;
                
                if (statusInterval) {
                    clearInterval(statusInterval);
                    statusInterval = null;
                }
            }
        }
        
        async function watchStream() {
            const video = document.getElementById('hlsVideo');
            const statusDiv = document.getElementById('viewer-status');
            const watchBtn = document.getElementById('watch-btn');
            const unwatchBtn = document.getElementById('unwatch-btn');
            
            try {
                log('Getting stream information...');
                const response = await fetch('http://localhost:8080/api/media/info');
                const info = await response.json();
                
                if (!info.isActive || !info.hlsUrl) {
                    throw new Error('No active stream available');
                }
                
                log(`Starting HLS playback: ${info.hlsUrl}`);
                const hlsUrl = `http://localhost:8080${info.hlsUrl}`;
                
                if (Hls.isSupported()) {
                    hlsPlayer = new Hls({
                        debug: true,
                        enableWorker: true
                    });
                    
                    hlsPlayer.loadSource(hlsUrl);
                    hlsPlayer.attachMedia(video);
                    
                    hlsPlayer.on(Hls.Events.MANIFEST_PARSED, () => {
                        log('HLS manifest parsed, starting playback', 'success');
                        statusDiv.innerHTML = `<div class="status success">✅ Playing HLS stream</div>`;
                        video.play().catch(e => log(`Autoplay failed: ${e.message}`, 'error'));
                    });
                    
                    hlsPlayer.on(Hls.Events.ERROR, (event, data) => {
                        log(`HLS Error: ${data.type} - ${data.details}`, 'error');
                        if (data.fatal) {
                            statusDiv.innerHTML = `<div class="status error">❌ Fatal HLS error: ${data.details}</div>`;
                        }
                    });
                } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                    log('Using native HLS support');
                    video.src = hlsUrl;
                    video.play().catch(e => log(`Native HLS play failed: ${e.message}`, 'error'));
                } else {
                    throw new Error('HLS not supported in this browser');
                }
                
                watchBtn.disabled = true;
                unwatchBtn.disabled = false;
                
            } catch (error) {
                statusDiv.innerHTML = `<div class="status error">❌ Watch failed: ${error.message}</div>`;
                log(`Watch stream failed: ${error.message}`, 'error');
            }
        }
        
        function stopWatching() {
            const video = document.getElementById('hlsVideo');
            const statusDiv = document.getElementById('viewer-status');
            const watchBtn = document.getElementById('watch-btn');
            const unwatchBtn = document.getElementById('unwatch-btn');
            
            if (hlsPlayer) {
                hlsPlayer.destroy();
                hlsPlayer = null;
            }
            
            video.src = '';
            statusDiv.innerHTML = `<div class="status info">Stopped watching</div>`;
            log('Stopped watching stream');
            
            watchBtn.disabled = false;
            unwatchBtn.disabled = true;
        }
        
        async function getStreamInfo() {
            try {
                const response = await fetch('http://localhost:8080/api/stream/status');
                const status = await response.json();
                
                document.getElementById('stream-info').textContent = JSON.stringify(status, null, 2);
            } catch (error) {
                document.getElementById('stream-info').textContent = `Error: ${error.message}`;
                log(`Stream info failed: ${error.message}`, 'error');
            }
        }
        
        // Auto-test connection on load
        window.onload = () => {
            log('Page loaded, testing architecture...');
            testConnection();
            getStreamInfo();
        };
        
        // Cleanup on page unload
        window.onbeforeunload = () => {
            if (hlsPlayer) hlsPlayer.destroy();
            if (statusInterval) clearInterval(statusInterval);
        };
    </script>
</body>
</html>
